<section class="products-page" data-testid="product-list-page">
  <div class="page-header">
    <div>
      <p class="eyebrow">Produtos</p>
      <h1 data-testid="products-page-title">Catálogo de produtos</h1>
    </div>

    <button
      type="button"
      class="primary-action"
      (click)="createProduct()"
      data-testid="new-product-button"
    >
      Novo produto
    </button>
  </div>

  <app-product-filters
    [searchTerm]="store.searchTerm()"
    [selectedCategory]="store.selectedCategory()"
    [categories]="store.categories()"
    [suggestions]="store.searchSuggestions()"
    (searchTermChange)="store.setSearchTerm($event)"
    (selectedCategoryChange)="store.setSelectedCategory($event)"
    (clearFilters)="store.clearFilters()"
  />

  @if (store.loading()) {
    <app-loading-state data-testid="products-loading" />
  } @else if (store.error(); as error) {
    <app-error-state
      [message]="error"
      actionLabel="Tentar novamente"
      (retry)="retryLoadProducts()"
      data-testid="products-error"
    />
  } @else if (store.isEmpty()) {
    <app-empty-state
      [title]="emptyTitle()"
      [description]="emptyDescription()"
      actionLabel="Limpar filtros"
      (action)="store.clearFilters()"
      data-testid="products-empty"
    />
  } @else {
    <div class="products-grid" data-testid="products-grid">
      @for (product of store.paginatedProducts(); track product.id) {
        <app-product-card
          [product]="product"
          (view)="viewProduct($event)"
        />
      }
    </div>

    @if (store.totalFilteredProducts() > 0) {
      <app-product-pagination
        [currentPage]="store.currentPage()"
        [totalPages]="store.totalPages()"
        [pageSize]="store.pageSize()"
        [totalItems]="store.totalFilteredProducts()"
        [hasPreviousPage]="store.hasPreviousPage()"
        [hasNextPage]="store.hasNextPage()"
        (previousPage)="store.previousPage()"
        (nextPage)="store.nextPage()"
        (pageChange)="store.setCurrentPage($event)"
        (pageSizeChange)="store.setPageSize($event)"
      />
    }
  }
</section>
