<form class="product-form" [formGroup]="form" (ngSubmit)="submit()" data-testid="product-form">
  <label class="field">
    <span>Título</span>
    <input type="text" formControlName="title" data-testid="product-title-input" />
    @if (showError('title')) {
      <small data-testid="product-title-error">
        O título deve ter pelo menos 3 caracteres.
      </small>
    }
  </label>

  <label class="field">
    <span>Preço</span>
    <input type="number" min="0" step="0.01" formControlName="price" data-testid="product-price-input" />
    @if (showError('price')) {
      <small data-testid="product-price-error">
        Informe um preço maior que zero.
      </small>
    }
  </label>

  <label class="field">
    <span>Categoria</span>
    <select formControlName="category" data-testid="product-category-input">
      <option value="">Selecione uma categoria</option>
      @for (category of categories(); track category) {
        <option [value]="category">{{ category }}</option>
      }
    </select>
    @if (showError('category')) {
      <small data-testid="product-category-error">
        Selecione uma categoria.
      </small>
    }
  </label>

  <label class="field">
    <span>URL da imagem</span>
    <input type="url" formControlName="image" data-testid="product-image-input" />
    @if (showError('image')) {
      <small data-testid="product-image-error">
        Informe uma URL válida.
      </small>
    }
  </label>

  <label class="field full">
    <span>Descrição</span>
    <textarea rows="5" formControlName="description" data-testid="product-description-input"></textarea>
    @if (showError('description')) {
      <small data-testid="product-description-error">
        A descrição deve ter pelo menos 10 caracteres.
      </small>
    }
  </label>

  <div class="actions">
    <button type="button" class="secondary" (click)="cancel.emit()" data-testid="product-form-cancel">
      Cancelar
    </button>
    <button
      type="submit"
      class="primary"
      [disabled]="form.invalid || saving()"
      data-testid="product-form-submit"
    >
      {{ submitLabel }}
    </button>
  </div>
</form>
