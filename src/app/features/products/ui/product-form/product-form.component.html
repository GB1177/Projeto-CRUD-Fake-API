<form class="product-form" [formGroup]="form" (ngSubmit)="submit()" data-testid="product-form">
  <div class="fields">
    <div class="field-grid">
      <label class="field">
        <span>Título</span>
        <input type="text" formControlName="title" data-testid="product-title-input" />
        @if (showError('title')) {
          <small data-testid="product-title-error">
            O título deve ter pelo menos 3 caracteres.
          </small>
        }
      </label>

      <label class="field">
        <span>Preço</span>
        <input
          type="text"
          inputmode="decimal"
          formControlName="price"
          (blur)="formatPriceOnBlur()"
          data-testid="product-price-input"
        />
        @if (showError('price')) {
          <small data-testid="product-price-error">
            Informe um preço maior que zero.
          </small>
        }
      </label>

      <label class="field">
        <span>Categoria</span>
        <select formControlName="category" data-testid="product-category-input">
          <option value="">Selecione uma categoria</option>
          @for (category of categories(); track category) {
            <option [value]="category">{{ category }}</option>
          }
        </select>
        @if (showError('category')) {
          <small data-testid="product-category-error">
            Selecione uma categoria.
          </small>
        }
      </label>

      <label class="field">
        <span>URL da imagem</span>
        <input type="url" formControlName="image" data-testid="product-image-input" />
        @if (showError('image')) {
          <small data-testid="product-image-error">
            Informe uma URL válida.
          </small>
        }
      </label>
    </div>

    <label class="field">
      <span>Descrição</span>
      <textarea
        class="product-form__textarea"
        formControlName="description"
        data-testid="product-description-input"
      ></textarea>
      @if (showError('description')) {
        <small data-testid="product-description-error">
          A descrição deve ter pelo menos 10 caracteres.
        </small>
      }
    </label>

    <div class="actions">
      <button type="button" class="secondary" (click)="cancel.emit()" data-testid="product-form-cancel">
        Cancelar
      </button>
      <button
        type="submit"
        class="primary"
        [disabled]="form.invalid || saving()"
        data-testid="product-form-submit"
      >
        {{ submitLabel }}
      </button>
    </div>
  </div>

  <aside class="image-preview" aria-live="polite" data-testid="product-image-preview">
    <span>Prévia da imagem</span>
    <div class="preview-frame">
      @if (shouldShowImage()) {
        <img
          [src]="imagePreviewUrl()"
          alt="Prévia da imagem do produto"
          (error)="onImagePreviewError()"
          data-testid="product-image-preview-img"
        />
      } @else if (hasImagePreview()) {
        <p data-testid="product-image-preview-fallback">
          Não foi possível carregar esta imagem.
        </p>
      } @else {
        <p data-testid="product-image-preview-empty">
          Informe uma URL para visualizar a imagem.
        </p>
      }
    </div>
  </aside>
</form>
