<section class="filters" data-testid="product-filters">
  <label class="field">
    <span>Buscar produto</span>
    <div class="autocomplete">
      <input
        type="search"
        [formControl]="searchControl"
        (focus)="openSuggestions()"
        placeholder="Nome do produto"
        autocomplete="off"
        aria-autocomplete="list"
        [attr.aria-expanded]="shouldShowSuggestions()"
        data-testid="product-search-input"
      />

      @if (searchControl.value.trim().length > 0) {
        <button
          type="button"
          class="clear-search"
          aria-label="Limpar busca"
          (click)="clearSearchTerm()"
          data-testid="clear-search-button"
        >
          ×
        </button>
      }

      @if (shouldShowSuggestions()) {
        <ul class="suggestions" role="listbox" data-testid="search-suggestions">
          @for (suggestion of suggestions(); track suggestion) {
            <li role="presentation">
              <button
                type="button"
                role="option"
                (click)="selectSuggestion(suggestion)"
                data-testid="search-suggestion-item"
              >
                {{ suggestion }}
              </button>
            </li>
          }
        </ul>
      }
    </div>
  </label>

  <label class="field">
    <span>Categoria</span>
    <select
      [value]="selectedCategory()"
      (change)="onSelectedCategoryChange($event)"
      data-testid="category-filter-select"
    >
      <option value="">Todas</option>
      @for (category of categories(); track category) {
        <option [value]="category">{{ category }}</option>
      }
    </select>
  </label>

  <button type="button" (click)="clearAllFilters()" data-testid="clear-filters-button">
    Limpar filtros
  </button>
</section>
