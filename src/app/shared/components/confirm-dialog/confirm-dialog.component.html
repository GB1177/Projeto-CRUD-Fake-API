@if (open()) {
  <div class="backdrop" data-testid="confirm-dialog-backdrop">
    <section
      class="dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="confirm-dialog-title"
      data-testid="confirm-dialog"
    >
      <header>
        <h2 id="confirm-dialog-title" data-testid="confirm-dialog-title">
          {{ title() }}
        </h2>
        <button
          class="icon-button"
          type="button"
          aria-label="Fechar"
          (click)="cancel.emit()"
          data-testid="confirm-dialog-close"
        >
          x
        </button>
      </header>

      <p data-testid="confirm-dialog-message">{{ message() }}</p>

      <footer>
        <button
          class="secondary"
          type="button"
          (click)="cancel.emit()"
          data-testid="confirm-dialog-cancel"
        >
          {{ cancelLabel() }}
        </button>
        <button
          class="primary"
          type="button"
          (click)="confirm.emit()"
          data-testid="confirm-dialog-confirm"
        >
          {{ confirmLabel() }}
        </button>
      </footer>
    </section>
  </div>
}
