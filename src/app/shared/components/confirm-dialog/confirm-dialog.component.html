@if (open()) {
  <div
    class="backdrop"
    (click)="cancel.emit()"
    data-testid="confirm-dialog-backdrop"
  >
    <section
      class="dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="confirm-dialog-title"
      (click)="$event.stopPropagation()"
      data-testid="confirm-dialog"
    >
      <header>
        <h2 id="confirm-dialog-title" data-testid="confirm-dialog-title">
          {{ title() }}
        </h2>
      </header>

      <div class="message" data-testid="confirm-dialog-message">
        @if (dangerMessage()) {
          <p class="danger-message" data-testid="confirm-dialog-danger-message">
            {{ dangerMessage() }}
          </p>
        }
        <p data-testid="confirm-dialog-default-message">{{ message() }}</p>
      </div>

      <footer>
        <button
          class="secondary"
          type="button"
          (click)="cancel.emit()"
          data-testid="confirm-dialog-cancel-button"
        >
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          [class.primary]="confirmVariant() === 'primary'"
          [class.danger]="confirmVariant() === 'danger'"
          (click)="confirm.emit()"
          data-testid="confirm-dialog-confirm-button"
        >
          {{ confirmLabel() }}
        </button>
      </footer>
    </section>
  </div>
}
